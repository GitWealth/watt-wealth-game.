<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watt Wealth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #1a1a2e; color: white; text-align: center; font-family: sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh;
        }
        #energy-display { font-size: 60px; font-weight: bold; color: #ffd700; }
        #click-btn { 
            width: 200px; height: 200px; border-radius: 50%; border: none;
            background: orange; font-size: 80px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255,165,0,0.5);
        }
        .shop { margin-top: 20px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="energy-display">⚡ 0</div>
    <p>Прибуток: <span id="pps-display">0</span>/сек</p>
    <button id="click-btn">⚡</button>
    
    <div class="shop">
        <p>Панель: <span id="price">50</span> ⚡</p>
        <button id="buy-btn" onclick="buyGenerator()">Купити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready(); // ПОВІДОМЛЯЄМО ТЕЛЕГРАМ, ЩО МИ ГОТОВІ

        let energy = 0;
        let pps = 0;
        let generatorPrice = 50;

        // ЗАВАНТАЖЕННЯ
        function loadData() {
            try {
                tg.CloudStorage.getItems(['energy', 'pps', 'price'], (err, values) => {
                    if (!err) {
                        if (values.energy) energy = parseInt(values.energy);
                        if (values.pps) pps = parseInt(values.pps);
                        if (values.price) generatorPrice = parseInt(values.price);
                        updateUI();
                        console.log("Дані завантажено");
                    }
                });
            } catch (e) {
                console.error("Помилка CloudStorage:", e);
            }
        }

        // ЗБЕРЕЖЕННЯ
        function saveData() {
            const data = {
                'energy': energy.toString(),
                'pps': pps.toString(),
                'price': generatorPrice.toString()
            };
            tg.CloudStorage.setItems(data, (err) => {
                if (err) console.error("Помилка збереження:", err);
            });
        }

            energy += 1;
